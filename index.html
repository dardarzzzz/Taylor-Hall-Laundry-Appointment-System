<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taylor Hall Laundry System</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Supabase loads first so it's ready when app.js initializes it -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- app.js loads synchronously so all functions exist before the page renders -->
    <script src="app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Taylor Hall Laundry System</h1>
            <p>Book your laundry time slots with ease</p>
        </div>

        <div class="content">
            <!-- Login Form -->
            <div id="loginForm" class="auth-container">
                <h2 style="text-align: center; margin-bottom: 30px;">Login</h2>
                <div class="form-group">
                    <label for="loginEmail">Email or Student ID</label>
                    <input type="text" id="loginEmail" placeholder="Enter your email or ID">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn btn-primary" id="loginBtn">Login</button>
                <div class="link-btn" id="showSignupBtn">Don't have an account? Sign Up</div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-container hidden">
                <h2 style="text-align: center; margin-bottom: 30px;">Sign Up</h2>
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="signupStudentId">Student ID</label>
                    <input type="text" id="signupStudentId" placeholder="Enter your student ID">
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">
                </div>
                <button class="btn btn-primary" id="signupBtn">Sign Up</button>
                <div class="link-btn" id="showLoginBtn">Already have an account? Login</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('loginBtn').addEventListener('click', login);
            document.getElementById('signupBtn').addEventListener('click', signup);
            document.getElementById('showSignupBtn').addEventListener('click', showSignup);
            document.getElementById('showLoginBtn').addEventListener('click', showLogin);

            document.getElementById('loginPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') login();
            });
            document.getElementById('signupPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') signup();
            });
        });
    </script>
</body>
</html>
